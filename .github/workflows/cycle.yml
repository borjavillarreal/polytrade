name: polytrade-cycle

# Runs one full paper-mode cycle (fetch -> analyze -> score -> dashboard) in the
# cloud, on a schedule, so it works even when your computer is off. NO real trades.
# The Anthropic key comes from the encrypted repo secret. This workflow also:
#   * publishes the dashboard to GitHub Pages (a web link you can open anywhere)
#   * opens a GitHub issue that @mentions you (-> email) when the model flags a
#     NEW high-edge market or a market resolves.
#
# Manual "Run workflow" has a "test_alert" checkbox: tick it to send a one-time
# test alert email (it skips the real, paid cycle).

on:
  schedule:
    - cron: "0 */6 * * *"      # every 6 hours (UTC). Widen this to spend less.
  workflow_dispatch:
    inputs:
      test_alert:
        description: "Send a one-time TEST alert email (skips the real cycle)"
        type: boolean
        default: false

permissions:
  contents: write                # commit updated DB + dashboard back to the repo
  issues: write                  # open an alert issue (which emails you)

concurrency:
  group: polytrade-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: ${{ github.event.inputs.test_alert != 'true' }}
        run: pip install -r requirements.txt

      - name: Run one cycle
        if: ${{ github.event.inputs.test_alert != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_cycle.py

      - name: Publish dashboard as the Pages homepage
        if: ${{ github.event.inputs.test_alert != 'true' }}
        run: cp dashboard.html index.html

      - name: Commit updated predictions + dashboard
        if: ${{ github.event.inputs.test_alert != 'true' }}
        run: |
          git config user.name "polytrade-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f polytrade.db dashboard.html index.html
          if git diff --cached --quiet; then
            echo "No changes this cycle."
          else
            git commit -m "cycle $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Seed a TEST alert (manual test button only)
        if: ${{ github.event.inputs.test_alert == 'true' }}
        run: |
          printf -- '- TEST ALERT: email alerts are working. This is not a real market.\n' > alerts.txt

      - name: Email an alert if there is one
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s alerts.txt ]; then
            {
              echo "@${{ github.repository_owner }} — Polytrade flagged something this cycle:"
              echo
              cat alerts.txt
              echo
              echo "Dashboard: https://${{ github.repository_owner }}.github.io/polytrade/"
            } > issue_body.txt
            gh issue create --repo "${{ github.repository }}" \
              --title "Polytrade alert" \
              --body-file issue_body.txt
          else
            echo "Nothing to alert on this cycle — no email."
          fi
